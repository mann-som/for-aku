<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #ee9ca7);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  position: relative;
  width: 92vw;
  max-width: 420px;
  z-index: 2;
}

h1 { font-size: 26px; }
p { font-size: 18px; }

button {
  padding: 12px 24px;
  font-size: 18px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.25s ease;
}

button:hover { transform: scale(1.1); }

#yesBtn { background-color: #ff4d6d; color: white; }
#noBtn { background-color: #333; color: white; position: absolute; }

.image-wrapper {
  width: 100%;
  height: 420px;
  overflow: hidden;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  margin-top: 20px;
}

.image-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hidden { display: none; }

.fade { opacity: 0; transition: opacity 0.6s ease; }
.fade.show { opacity: 1; }

.slide {
  opacity: 0;
  transform: translateX(0);
  transition: transform 0.5s ease, opacity 0.5s ease;
}

.slide.from-right { transform: translateX(60px); }
.slide.from-left { transform: translateX(-60px); }

.slide.show {
  opacity: 1;
  transform: translateX(0);
}

.nav-buttons { margin-top: 20px; }

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -20px;
  font-size: 16px;
  opacity: 0.6;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}

/* ===== Background memory animation ===== */
#bgMemories {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

.bg-img {
  position: absolute;
  width: 110px;
  height: 110px;
  object-fit: cover;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);

  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.3);
  opacity: 0;

  animation: popOut 1.5s ease forwards;
}

.img1 { animation-delay: 0.2s; --x: 10vw; --y: 10vh; }
.img2 { animation-delay: 0.4s; --x: 75vw; --y: 10vh; }
.img3 { animation-delay: 0.6s; --x: 10vw; --y: 70vh; }
.img4 { animation-delay: 0.8s; --x: 75vw; --y: 70vh; }

@keyframes popOut {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); }
  40% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  60% { transform: translate(-50%, -50%) scale(0.9); }
  100% {
    transform: translate(var(--x), var(--y)) scale(1);
    opacity: 0.9;
  }
}

/* Floating sad emojis */
.floating-emoji {
  position: fixed;
  bottom: -20px;
  font-size: 20px;
  opacity: 0.7;
  animation: floatEmoji linear forwards;
}

@keyframes floatEmoji {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- Background Photos -->
<div id="bgMemories">
  <img src="photo5.jpeg" class="bg-img img1">
  <img src="photo6.jpeg" class="bg-img img2">
  <img src="photo7.jpeg" class="bg-img img3">
  <img src="photo8.jpeg" class="bg-img img4">
</div>

<!-- Question -->
<div id="questionScreen" class="container fade show">
  <h1 id="questionText">Will you be my Valentine? AGAIN! ❤️</h1>
  <button id="yesBtn">Yes mwahh</button>
  <button id="noBtn">No :(</button>
</div>

<!-- Journey -->
<div id="journeyScreen" class="container hidden fade">
  <div id="pageContent"></div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const questionText = document.getElementById("questionText");

let yesScale = 1;

const texts = [
  "Are you sure? 🥺",
  "Think again…",
  "I’ll be very sad 😢",
  "Please say yes ❤️",
  "You can't escape destiny 😌"
];

noBtn.addEventListener("click", () => {
  yesScale += 0.2;
  yesBtn.style.transform = `scale(${yesScale})`;
  questionText.textContent = texts[Math.floor(Math.random() * texts.length)];

  const x = Math.random() * 250 - 125;
  const y = Math.random() * 250 - 125;
  noBtn.style.transform = `translate(${x}px, ${y}px)`;
});

yesBtn.addEventListener("click", () => {
  explodeHearts();

  const q = document.getElementById("questionScreen");
  const j = document.getElementById("journeyScreen");

  q.classList.remove("show");

  setTimeout(() => {
    q.classList.add("hidden");
    j.classList.remove("hidden");

    requestAnimationFrame(()=>{
      j.classList.add("show");
      renderPage();
    });

  }, 700);
});

/* Pages */
const pages = [
  { title:"Our First Date 🥰", text:"That day when i fell in love with you.", img:"photo1.jpeg"},
  { title:"All Our craziness 💕", text:"Crazy memories 😂", img:"photo2.jpeg"},
  { title:"Beginning ❤️", text:"I love every second.", img:"photo3.jpeg"},
  { title:"I LOVE YOU ❤️", text:"More us.", img:"photo4.jpeg"}
];

let currentPage = 0;

function renderPage(direction="right") {
  const content = pages[currentPage];
  const entry = direction === "right" ? "from-right" : "from-left";
  const container = document.getElementById("pageContent");

  container.innerHTML = `
    <div id="slide" class="slide ${entry}">
      <h1>${content.title}</h1>
      <p>${content.text}</p>
      <div class="image-wrapper">
        <img src="${content.img}">
      </div>
      <div class="nav-buttons">
        ${currentPage > 0 ? `<button onclick="prevPage()">← Previous</button>` : ""}
        ${currentPage < pages.length-1 ? `<button onclick="nextPage()">Next →</button>` : ""}
      </div>
    </div>
  `;

  requestAnimationFrame(()=>{
    document.getElementById("slide").classList.add("show");
  });
}

function nextPage(){ if(currentPage<pages.length-1){ currentPage++; renderPage("right"); }}
function prevPage(){ if(currentPage>0){ currentPage--; renderPage("left"); }}

/* Floating hearts */
setInterval(()=>createHeart(),800);
function createHeart(){
  const h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(Math.random()*10+10)+"px";
  h.style.animationDuration=(Math.random()*4+4)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),8000);
}

/* Explosion hearts */
function explodeHearts(){
  for(let i=0;i<60;i++){
    const h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left="50vw";
    h.style.fontSize=(Math.random()*20+20)+"px";
    h.style.animationDuration=(Math.random()*2+2)+"s";
    h.style.transform=`translate(${Math.random()*400-200}px,${Math.random()*-400}px)`;
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  }
}

/* Floating sad emojis */
setInterval(()=>createFunnyEmoji(),1200);

function createFunnyEmoji(){
  const e=document.createElement("div");
  e.className="floating-emoji";
  const emojis=["😢","🥺","🙏"];
  e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
  e.style.left=Math.random()*100+"vw";
  e.style.fontSize=(Math.random()*10+16)+"px";
  e.style.animationDuration=(Math.random()*4+4)+"s";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),8000);
}
</script>

</body>
</html>
